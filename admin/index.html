<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vulcan Society — Content Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: #0A0A0A !important;
      color: #F0EDE6 !important;
      font-family: 'Barlow', sans-serif !important;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: rgba(212,160,23,0.35); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #D4A017; }
  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
  const THEME_CSS = `
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;700;900&family=Barlow:wght@300;400;500&display=swap');

    :host { --vs-black:#0A0A0A; --vs-dark:#111111; --vs-mid:#1A1A1A; --vs-card:#1E1E1E; --vs-border:#2A2A2A; --vs-maroon:#8B0000; --vs-gold:#D4A017; --vs-gold-b:#F5C842; --vs-gold-dim:rgba(212,160,23,0.15); --vs-gold-line:rgba(212,160,23,0.30); --vs-white:#F0EDE6; --vs-grey:#888888; }

    * { box-sizing: border-box; }

    body, #root, #nc-root { background: #0A0A0A !important; color: #F0EDE6 !important; font-family: 'Barlow', sans-serif !important; }

    header { background: #8B0000 !important; border-bottom: 2px solid #D4A017 !important; }
    header * { color: #F0EDE6 !important; font-family: 'Barlow Condensed', sans-serif !important; }
    header a:hover, header button:hover { color: #D4A017 !important; }
    header svg { fill: #F0EDE6 !important; }

    aside, [class*="Sidebar"], [class*="sidebar"] { background: #111111 !important; border-right: 1px solid #2A2A2A !important; }
    aside *, [class*="Sidebar"] * { color: #F0EDE6 !important; }
    aside h2, aside h3, [class*="Sidebar"] h2, [class*="Sidebar"] h3 { font-family: 'Bebas Neue', sans-serif !important; color: #D4A017 !important; letter-spacing: 0.12em !important; text-transform: uppercase !important; border-bottom: 1px solid rgba(212,160,23,0.3) !important; }
    aside a, [class*="Sidebar"] a { font-family: 'Barlow Condensed', sans-serif !important; font-weight: 700 !important; text-transform: uppercase !important; color: rgba(240,237,230,0.75) !important; text-decoration: none !important; }
    aside a:hover, [class*="Sidebar"] a:hover { color: #D4A017 !important; background: rgba(212,160,23,0.1) !important; }
    aside a[aria-current], [class*="active"] > a, [class*="Sidebar"] a[class*="active"] { color: #D4A017 !important; background: rgba(212,160,23,0.12) !important; border-left: 3px solid #D4A017 !important; }

    main, [role="main"] { background: #0A0A0A !important; }
    main h1, main h2 { font-family: 'Bebas Neue', sans-serif !important; letter-spacing: 0.08em !important; color: #F0EDE6 !important; text-transform: uppercase !important; }

    [class*="ListCard"], [class*="EntryCard"], ul li { background: #1E1E1E !important; border-color: #2A2A2A !important; color: #F0EDE6 !important; }
    [class*="ListCard"]:hover, [class*="EntryCard"]:hover, ul li:hover { border-color: #D4A017 !important; }
    [class*="ListCard"] *, [class*="EntryCard"] * { color: #F0EDE6 !important; }

    button { font-family: 'Barlow Condensed', sans-serif !important; font-weight: 700 !important; letter-spacing: 0.08em !important; cursor: pointer !important; }

    input, textarea, select { background: #1A1A1A !important; border: 1px solid #2A2A2A !important; color: #F0EDE6 !important; border-radius: 4px !important; font-family: 'Barlow', sans-serif !important; font-size: 14px !important; padding: 9px 12px !important; }
    input:focus, textarea:focus, select:focus { border-color: #D4A017 !important; outline: none !important; box-shadow: 0 0 0 3px rgba(212,160,23,0.15) !important; }
    input::placeholder, textarea::placeholder { color: #555 !important; }
    label { font-family: 'Barlow Condensed', sans-serif !important; font-weight: 700 !important; font-size: 11px !important; letter-spacing: 0.15em !important; text-transform: uppercase !important; color: #D4A017 !important; }

    [style*="background-color: rgb(255"],[style*="background-color: white"],[style*="background: white"],[style*="background-color: rgb(241"],[style*="background-color: rgb(242"],[style*="background-color: rgb(243"],[style*="background-color: rgb(244"],[style*="background-color: rgb(245"],[style*="background-color: rgb(246"],[style*="background-color: rgb(247"],[style*="background-color: rgb(248"],[style*="background-color: rgb(249"],[style*="background-color: rgb(250"],[style*="background-color: rgb(251"],[style*="background-color: rgb(252"],[style*="background-color: rgb(253"],[style*="background-color: rgb(254"] { background-color: #1E1E1E !important; color: #F0EDE6 !important; }

    [style*="color: rgb(0, 0"],[style*="color: black"],[style*="color: #000"] { color: #F0EDE6 !important; }

    a { color: #D4A017 !important; text-decoration: none !important; }
    a:hover { color: #F5C842 !important; }

    [role="dialog"], [role="alertdialog"] { background: #1E1E1E !important; border: 1px solid rgba(212,160,23,0.3) !important; color: #F0EDE6 !important; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: rgba(212,160,23,0.3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #D4A017; }

    hr { border: none !important; border-top: 1px solid rgba(212,160,23,0.2) !important; }
    *:focus-visible { outline: 2px solid #D4A017 !important; }
    input[type="checkbox"], input[type="radio"] { accent-color: #D4A017 !important; }

    /* ── COLLECTION HEADER (the white box with title + New button) ── */
    /* Decap renders this as a top-level div before the list */
    main > div, main > section,
    [class*="CollectionHeader"], [class*="collection-header"],
    [class*="PageHeader"], [class*="page-header"],
    [class*="Toolbar"], [class*="toolbar"] {
      background: #111111 !important;
      border-bottom: 1px solid rgba(212,160,23,0.25) !important;
      color: #F0EDE6 !important;
    }

    /* The title text inside that header */
    [class*="CollectionHeader"] h1, [class*="CollectionHeader"] h2,
    [class*="PageHeader"] h1, [class*="PageHeader"] h2,
    main > div > h1, main > div > h2,
    main > section > h1, main > section > h2 {
      font-family: 'Bebas Neue', sans-serif !important;
      color: #F0EDE6 !important;
      letter-spacing: 0.1em !important;
      text-transform: uppercase !important;
    }

    /* "New Events" button — make it gold */
    [class*="CollectionHeader"] button,
    [class*="PageHeader"] button,
    main > div > button,
    main > section > button,
    [class*="Toolbar"] button:last-child {
      background: #D4A017 !important;
      color: #0A0A0A !important;
      border: none !important;
      font-family: 'Bebas Neue', sans-serif !important;
      font-size: 16px !important;
      letter-spacing: 0.1em !important;
      border-radius: 4px !important;
      padding: 10px 20px !important;
    }
    [class*="CollectionHeader"] button:hover,
    main > div > button:hover { background: #F5C842 !important; }

    /* Force ALL divs that somehow got white background dark */
    div { background-color: inherit; }

    /* ── EDITOR / ENTRY FORM PANEL ── */
    /* The right-side editor pane and its split layout */
    [class*="EditorContainer"], [class*="editor-container"],
    [class*="ControlPane"], [class*="control-pane"],
    [class*="EditorContent"], [class*="editor-content"],
    [class*="EditorInterface"], [class*="editor-interface"],
    [class*="EditorToggle"], [class*="editor-toggle"],
    [class*="PreviewPane"], [class*="preview-pane"],
    [class*="SplitPane"], [class*="split-pane"] {
      background: #0A0A0A !important;
      color: #F0EDE6 !important;
    }

    /* Editor top toolbar (Published / Save bar) */
    [class*="ToolbarContainer"], [class*="toolbar-container"],
    [class*="EditorToolbar"], [class*="editor-toolbar"],
    [class*="AppHeader"], [class*="app-header"],
    [class*="TopBar"], [class*="top-bar"],
    [class*="NavBar"], [class*="nav-bar"] {
      background: #8B0000 !important;
      border-bottom: 2px solid #D4A017 !important;
      color: #F0EDE6 !important;
    }
    [class*="ToolbarContainer"] *, [class*="EditorToolbar"] *,
    [class*="AppHeader"] *, [class*="TopBar"] * {
      color: #F0EDE6 !important;
    }

    /* "Published" status badge */
    [class*="published"], [class*="Published"] {
      color: #2ecc71 !important;
      border-color: #2ecc71 !important;
    }

    /* "CHANGES SAVED" green text */
    [class*="saved"], [class*="Saved"] {
      color: #2ecc71 !important;
    }

    /* Save / Publish button in editor toolbar */
    [class*="ToolbarContainer"] button[class*="primary"],
    [class*="EditorToolbar"] button[class*="primary"] {
      background: #D4A017 !important;
      color: #0A0A0A !important;
      border: none !important;
      font-family: 'Bebas Neue', sans-serif !important;
    }

    /* Editor preview right panel (white half) */
    [class*="PreviewContainer"], [class*="preview-container"],
    [class*="EditorPreview"], [class*="editor-preview"],
    [class*="Preview"], iframe {
      background: #111111 !important;
    }

    /* Every direct child of body that could be a panel */
    body > div { background: #0A0A0A !important; }

    /* Catch-all: any remaining white panels */
    section, article { background: #0A0A0A !important; color: #F0EDE6 !important; }

    /* ── PHOTO / IMAGE UPLOAD WIDGET ── */
    [class*="FileControl"], [class*="file-control"],
    [class*="ImageControl"], [class*="image-control"],
    [class*="UploadControl"], [class*="upload-control"],
    [class*="FileWidget"], [class*="file-widget"],
    [class*="ImageWidget"], [class*="image-widget"] {
      background: #1A1A1A !important;
      border: 1px solid #2A2A2A !important;
      border-radius: 4px !important;
      color: #F0EDE6 !important;
    }

    /* The white box that wraps "Choose an image" / "Insert from URL" */
    [class*="FileControl"] > div,
    [class*="ImageControl"] > div,
    [class*="UploadControl"] > div,
    [class*="image-control"] > div {
      background: #1A1A1A !important;
      border: none !important;
    }

    /* "Choose an image" and "Insert from URL" buttons/links */
    [class*="FileControl"] button,
    [class*="ImageControl"] button,
    [class*="UploadControl"] button,
    [class*="FileControl"] a,
    [class*="ImageControl"] a,
    [class*="image-control"] button,
    [class*="image-control"] a {
      background: transparent !important;
      color: #D4A017 !important;
      border: 1px solid rgba(212,160,23,0.4) !important;
      border-radius: 4px !important;
      font-family: 'Barlow Condensed', sans-serif !important;
      font-weight: 700 !important;
      letter-spacing: 0.06em !important;
      padding: 6px 14px !important;
      text-decoration: none !important;
    }
    [class*="FileControl"] button:hover,
    [class*="ImageControl"] button:hover,
    [class*="image-control"] button:hover {
      background: rgba(212,160,23,0.1) !important;
    }

    /* ── PUBLISH BUTTON (teal → gold) ── */
    /* Targets the main Publish/Save button in the editor top bar */
    [class*="ToolbarContainer"] button,
    [class*="EditorToolbar"] button,
    header button[class*="success"],
    header button[class*="publish"],
    header button[style*="background-color: rgb(0, 200"],
    header button[style*="background-color: rgb(0, 150"],
    header button[style*="background-color: rgb(32, 156"],
    header button[style*="background-color: rgb(20"],
    button[class*="Publish"],
    button[class*="publish"] {
      background: #D4A017 !important;
      color: #0A0A0A !important;
      border: none !important;
      font-family: 'Bebas Neue', sans-serif !important;
      font-size: 16px !important;
      letter-spacing: 0.1em !important;
    }

    /* Teal/cyan color override — catch any teal by its RGB values */
    [style*="background-color: rgb(0, 1"],
    [style*="background-color: rgb(0, 2"],
    [style*="background-color: rgb(32, 1"],
    [style*="background-color: teal"],
    [style*="background-color: cyan"] {
      background-color: #D4A017 !important;
      color: #0A0A0A !important;
    }

    /* Blue links → gold */
    [style*="color: rgb(0, 0, 2"],
    [style*="color: rgb(0, 1"],
    [style*="color: blue"],
    [style*="color: teal"] {
      color: #D4A017 !important;
    }
  `;

  function injectTheme() {
    // Always re-inject into main document (remove and re-add to pick up new elements)
    const existing = document.getElementById('vs-outer');
    if (existing) existing.remove();
    const s = document.createElement('style');
    s.id = 'vs-outer';
    s.textContent = THEME_CSS;
    document.head.appendChild(s);

    // Inject into every Shadow Root found — always replace to stay fresh
    function pierce(node) {
      if (node.shadowRoot) {
        const root = node.shadowRoot;
        const old = root.querySelector('#vs-shadow');
        if (old) old.remove();
        const sh = document.createElement('style');
        sh.id = 'vs-shadow';
        sh.textContent = THEME_CSS;
        root.insertBefore(sh, root.firstChild);
        pierce(root);
      }
      for (const child of node.children || []) pierce(child);
    }

    pierce(document.documentElement);
  }

  // Inject at multiple intervals to catch lazy-mounted components
  injectTheme();
  [100, 300, 600, 1000, 2000, 4000, 8000].forEach(t => setTimeout(injectTheme, t));

  // Re-inject on every hash change (Decap uses hash routing — new route = new components)
  window.addEventListener('hashchange', () => {
    injectTheme();
    [100, 300, 600, 1200, 2500].forEach(t => setTimeout(injectTheme, t));
  });

  // Watch for new nodes being added — throttled to avoid thrashing
  let throttle;
  new MutationObserver(() => {
    clearTimeout(throttle);
    throttle = setTimeout(injectTheme, 150);
  }).observe(document.documentElement, { childList: true, subtree: true });
  </script>
</body>
</html>
